<div id="quizModal" class="fixed inset-0 bg-[#0077B6]/80 backdrop-blur-sm hidden items-center justify-center z-50 transition-all duration-300 opacity-0">

  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-lg mx-4 transform scale-95 transition-all duration-300 relative overflow-hidden" id="quizCard">

    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#0077B6] to-[#00B4D8]"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-[#caf0f8] text-[#F5B7B1] mb-4 shadow-inner">
        <i class="fa-solid fa-star text-4xl animate-pulse"></i>
      </div>
      <h3 class="text-3xl font-extrabold text-[#0077B6]">Tantangan Mini!</h3>
      <p class="text-[#00B4D8] font-medium mt-1">Jawab yuk biar bisa lanjut level!</p>
    </div>

    <div class="bg-[#fefefe] border-2 border-[#90E0EF] rounded-2xl p-6 text-center mb-8 shadow-sm relative">
      <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-white px-4 text-sm font-bold text-[#00B4D8]">
        PERTANYAAN
      </div>
      <p class="text-2xl font-bold text-[#0077B6] leading-snug" id="questionText">
        {{ quiz_data.pertanyaan|default:"Siap?" }}
      </p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      {% for pilihan in quiz_data.pilihan %}
      <button onclick="checkAnswer(this, '{{ pilihan }}', '{{ quiz_data.jawaban_benar }}')"
              class="quiz-option p-4 rounded-xl border-2 border-[#caf0f8] bg-white text-[#0077B6] font-bold text-lg hover:border-[#00B4D8] hover:bg-[#caf0f8] hover:shadow-md transition-all duration-200 active:scale-95">
        {{ pilihan }}
      </button>
      {% empty %}
       <p class="col-span-2 text-center text-gray-400 italic">Memuat soal...</p>
      {% endfor %}
    </div>

    <div id="feedbackMessage" class="hidden text-center mb-6 font-bold text-lg animate-bounce"></div>

    <div class="text-center">
      <button onclick="closeQuiz()" class="text-gray-400 text-sm font-medium hover:text-[#F5B7B1] transition-colors underline decoration-dotted">
        Nyerah? Kembali Belajar Aja
      </button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById('quizModal');
  const card = document.getElementById('quizCard');
  const feedback = document.getElementById('feedbackMessage');
  const nextUrl = "{% url 'mark_materi_completed' materi_id %}";

  function openQuiz() {
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
      modal.classList.remove('opacity-0');
      card.classList.remove('scale-95');
      card.classList.add('scale-100');
    }, 10);
  }

  function closeQuiz() {
    modal.classList.add('opacity-0');
    card.classList.remove('scale-100');
    card.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      resetButtons();
    }, 300);
  }

  function resetButtons() {
    const buttons = document.querySelectorAll('.quiz-option');
    buttons.forEach(btn => {
      btn.disabled = false;
      // Reset ke style awal (Biru & Putih)
      btn.className = "quiz-option p-4 rounded-xl border-2 border-[#caf0f8] bg-white text-[#0077B6] font-bold text-lg hover:border-[#00B4D8] hover:bg-[#caf0f8] hover:shadow-md transition-all duration-200 active:scale-95";
    });
    feedback.classList.add('hidden');
  }

  function checkAnswer(btn, chosen, correct) {
    const buttons = document.querySelectorAll('.quiz-option');
    buttons.forEach(b => b.disabled = true);

    if (chosen === correct) {
      // BENAR: Ubah jadi Hijau/Biru Tua + Icon
      btn.className = "quiz-option p-4 rounded-xl bg-[#00B4D8] text-white border-2 border-[#0077B6] shadow-lg font-bold text-lg transition-all scale-105";
      btn.innerHTML += " <i class='fa-solid fa-check ml-2'></i>";

      feedback.textContent = "🎉 Yey! Jawaban Benar!";
      feedback.className = "text-center mb-6 font-bold text-xl text-[#00B4D8] animate-bounce block";
      setTimeout(() => window.location.href = nextUrl, 1500);
    } else {
      // SALAH: Ubah jadi Pink/Merah
      btn.className = "quiz-option p-4 rounded-xl bg-[#F5B7B1] text-white border-2 border-[#e5a09a] font-bold text-lg transition-all shake";
      btn.innerHTML += " <i class='fa-solid fa-xmark ml-2'></i>";

      feedback.textContent = "😅 Ups! Coba lagi ya...";
      feedback.className = "text-center mb-6 font-bold text-xl text-[#F5B7B1] block";
      setTimeout(() => resetButtons(), 1500);
    }
  }

  // Animasi Shake untuk salah
  const style = document.createElement('style');
  style.innerHTML = `
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s; }
  `;
  document.head.appendChild(style);
</script>
