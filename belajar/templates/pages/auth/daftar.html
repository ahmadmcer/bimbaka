{% extends 'auth_base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-blue-100">
    <h2 class="text-3xl font-bold text-center text-blue-600 mb-2">Daftar Akun Guru</h2>
    <p class="text-gray-500 text-center mb-8">Silakan buat akun untuk mulai mengelola kelas.</p>

    <form method="POST" action="{% url 'daftar' %}" class="space-y-4">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Depan</label>
                <input type="text" name="first_name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Belakang</label>
                <input type="text" name="last_name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mengajar di Kelas</label>
            <select name="kelas" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="kelas_2">Kelas 2</option>
                <option value="kelas_3">Kelas 3</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 text-red-600">Kode Pendaftaran Guru</label>
            <input type="text" name="kode_guru" placeholder="Masukkan kode BIMBAKAXXXX" required class="w-full px-4 py-2 border-2 border-red-100 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi</label>
                <input type="password" name="confirm_password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 transform hover:scale-[1.02]">
            Daftar Akun Guru
        </button>
    </form>

    <p class="mt-6 text-center text-gray-600">
        Sudah punya akun? <a href="{% url 'masuk' %}" class="text-blue-600 font-semibold hover:underline">Masuk di sini</a>
    </p>
</div>
{% endblock %}
